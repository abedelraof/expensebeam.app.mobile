name: expensebeam_mobile
description: "ExpenseBeam - Personal Finance Tracker"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP & Storage
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # State Management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.69.0

  # UI Utilities
  intl: ^0.19.0
  file_picker: ^8.1.7
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
